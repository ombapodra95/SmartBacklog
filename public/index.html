<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agile Kanban AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-0: #07080c; --bg-1: #0c0e14; --bg-2: #11131b; --bg-3: #171a24; --bg-4: #1d2030;
      --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.1);
      --text-1: #dfe3ef; --text-2: #8b90a8; --text-3: #555a72;
      --accent: #6c5ce7; --accent-dim: rgba(108,92,231,0.15); --accent-glow: rgba(108,92,231,0.06);
      --teal: #00b4d8; --teal-dim: rgba(0,180,216,0.12);
      --green: #00c897; --green-dim: rgba(0,200,151,0.12);
      --amber: #e8a838; --amber-dim: rgba(232,168,56,0.12);
      --rose: #e84868; --rose-dim: rgba(232,72,104,0.12);
      --r: 10px; --r-lg: 14px;
      --lm-bg-0: #f4f5f9; --lm-bg-1: #ffffff; --lm-bg-2: #f8f9fc; --lm-bg-3: #eef0f6; --lm-bg-4: #e4e7f0;
      --lm-border: rgba(0,0,0,0.07); --lm-border-h: rgba(0,0,0,0.12);
      --lm-text-1: #1a1d2e; --lm-text-2: #5f6380; --lm-text-3: #9598aa;
    }
    html:not(.dark) {
      --bg-0: var(--lm-bg-0); --bg-1: var(--lm-bg-1); --bg-2: var(--lm-bg-2);
      --bg-3: var(--lm-bg-3); --bg-4: var(--lm-bg-4);
      --border: var(--lm-border); --border-h: var(--lm-border-h);
      --text-1: var(--lm-text-1); --text-2: var(--lm-text-2); --text-3: var(--lm-text-3);
      --accent-dim: rgba(108,92,231,0.08); --accent-glow: rgba(108,92,231,0.04);
      --teal-dim: rgba(0,180,216,0.08); --green-dim: rgba(0,200,151,0.08);
      --amber-dim: rgba(232,168,56,0.08); --rose-dim: rgba(232,72,104,0.08);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-0); color: var(--text-1); min-height: 100vh; transition: background 0.3s, color 0.3s; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 70% 50% at 50% 30%, black 20%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse 70% 50% at 50% 30%, black 20%, transparent 70%); }
    .bg-glow { position: fixed; top: -20%; left: 50%; transform: translateX(-50%); width: 800px; height: 500px; border-radius: 50%; background: radial-gradient(ellipse, rgba(108,92,231,0.06) 0%, transparent 70%); pointer-events: none; z-index: -1; }

    /* Header */
    .header { position: sticky; top: 0; z-index: 30; height: 56px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--bg-1); border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 8px; position: relative; background: var(--bg-3); border: 1px solid var(--border-h); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .brand-mark::before { content: ''; position: absolute; inset: 3px; border-radius: 5px; border: 1.5px solid var(--accent); opacity: 0.5; }
    .brand-mark span { font-size: 12px; font-weight: 800; color: var(--accent); position: relative; z-index: 1; }
    .brand-name { font-size: 0.88rem; font-weight: 700; letter-spacing: -0.02em; }
    .brand-sep { color: var(--text-3); font-size: 0.7rem; }
    .brand-ai { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }

    .search-wrap { position: relative; display: none; }
    @media (min-width: 768px) { .search-wrap { display: block; } }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-3); }
    #search-input { width: 200px; padding: 7px 10px 7px 32px; font-size: 0.78rem; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text-1); outline: none; font-family: inherit; transition: all 0.25s; }
    #search-input::placeholder { color: var(--text-3); }
    #search-input:focus { width: 260px; border-color: rgba(108,92,231,0.3); box-shadow: 0 0 0 3px var(--accent-glow); }

    .h-actions { display: flex; align-items: center; gap: 6px; }
    .h-btn { height: 32px; border-radius: var(--r); border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 0.9rem; }
    .h-btn:hover { border-color: var(--border-h); color: var(--text-1); background: var(--bg-3); }
    .h-btn-icon { width: 32px; }
    .h-btn-new { padding: 0 14px; gap: 5px; font-size: 0.74rem; font-weight: 700; background: var(--accent); border-color: var(--accent); color: #fff; }
    .h-btn-new:hover { opacity: 0.88; background: var(--accent); }

    /* Stats */
    .stats { display: flex; gap: 1px; margin: 20px 28px 0; background: var(--border); border-radius: var(--r-lg); overflow: hidden; }
    .stat { flex: 1; padding: 14px 12px; background: var(--bg-1); display: flex; flex-direction: column; align-items: center; gap: 3px; transition: background 0.15s; }
    .stat:hover { background: var(--bg-2); }
    .stat.stat-prog { flex: 2; }
    .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .stat-num.n-todo { color: var(--text-2); } .stat-num.n-prog { color: var(--teal); } .stat-num.n-done { color: var(--green); }
    .stat-tag { font-size: 0.54rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); }
    .pbar-track { width: 100%; height: 4px; background: var(--bg-3); border-radius: 99px; overflow: hidden; margin-bottom: 3px; }
    .pbar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--teal)); transition: width 0.5s cubic-bezier(0.23,1,0.32,1); }

    /* Board */
    .board { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; padding: 14px 28px 32px; }
    @media (max-width: 768px) { .board { grid-template-columns: 1fr; } }

    .column { background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--r-lg); display: flex; flex-direction: column; min-height: 320px; position: relative; }
    .column::before { content: ''; position: absolute; top: 0; left: 16px; right: 16px; height: 1px; }
    .column:nth-child(1)::before { background: linear-gradient(90deg, transparent, var(--text-3), transparent); }
    .column:nth-child(2)::before { background: linear-gradient(90deg, transparent, var(--teal), transparent); opacity: 0.4; }
    .column:nth-child(3)::before { background: linear-gradient(90deg, transparent, var(--green), transparent); opacity: 0.4; }

    .col-head { padding: 14px 14px 12px; display: flex; align-items: center; justify-content: space-between; }
    .col-left { display: flex; align-items: center; gap: 8px; }
    .col-indicator { width: 6px; height: 6px; border-radius: 2px; }
    .ci-todo { background: var(--text-3); } .ci-prog { background: var(--teal); box-shadow: 0 0 6px rgba(0,180,216,0.3); } .ci-done { background: var(--green); box-shadow: 0 0 6px rgba(0,200,151,0.3); }
    .col-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-2); }
    .col-num { font-family: 'JetBrains Mono', monospace; font-size: 0.64rem; font-weight: 600; color: var(--text-3); background: var(--bg-3); padding: 1px 7px; border-radius: 4px; }
    .col-plus { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-3); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .col-plus:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .drop-zone { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 65vh; }
    .drop-zone.drag-over { background: var(--accent-glow); outline: 1px dashed rgba(108,92,231,0.25); outline-offset: -4px; border-radius: 0 0 var(--r-lg) var(--r-lg); }
    .drop-zone::-webkit-scrollbar { width: 3px; } .drop-zone::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 99px; }

    /* Cards */
    .ticket-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; cursor: grab; transition: all 0.15s; }
    .ticket-card:hover { border-color: var(--border-h); background: var(--bg-3); }
    .ticket-card.dragging { opacity: 0.25; transform: scale(0.97); }
    .ticket-card.active-card { border-color: var(--accent); background: var(--bg-3); }
    .border-priority-blocking { border-left: 2px solid var(--rose); }
    .border-priority-urgent   { border-left: 2px solid var(--amber); }
    .border-priority-normal   { border-left: 2px solid var(--bg-4); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: 0.8rem; font-weight: 600; color: var(--text-1); line-height: 1.4; flex: 1; }
    .card-desc { font-size: 0.7rem; color: var(--text-2); margin-top: 6px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
    .ticket-card:hover .card-actions { opacity: 1; }
    .card-action-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .card-action-edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .card-action-del:hover  { border-color: var(--rose); color: var(--rose); background: var(--rose-dim); }

    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .card-meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .card-time { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text-3); }

    .badge-points   { font-family: 'JetBrains Mono', monospace; background: var(--accent-dim); color: var(--accent); font-size: 0.58rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-criteria { font-family: 'JetBrains Mono', monospace; background: var(--green-dim); color: var(--green); font-size: 0.58rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-priority { font-family: 'JetBrains Mono', monospace; font-size: 0.54rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .badge-blocking { background: var(--rose-dim); color: var(--rose); }
    .badge-urgent   { background: var(--amber-dim); color: var(--amber); }
    .badge-normal   { background: var(--bg-3); color: var(--text-3); }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: 6px; }
    .empty-icon { font-size: 1.4rem; opacity: 0.2; }
    .empty-label { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; color: var(--text-3); font-weight: 500; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; z-index: 40; background: rgba(4,5,10,0.65); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.hidden { display: none; }
    .modal-box { width: 100%; max-width: 540px; max-height: 88vh; background: var(--bg-0); border: 1px solid var(--border-h); border-radius: 14px; display: flex; flex-direction: column; animation: mIn 0.2s ease-out; position: relative; overflow: hidden; }
    @keyframes mIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }

    .m-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--bg-1); border-bottom: 1px solid var(--border); }
    .m-head h2 { font-size: 0.84rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .m-head h2 .m-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.48rem; font-weight: 600; color: var(--accent); background: var(--accent-dim); padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
    .m-close { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-3); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .m-close:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-dim); }

    .m-toolbar { padding: 10px 20px; background: var(--bg-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .m-toolbar-left { display: flex; align-items: center; gap: 8px; font-size: 0.68rem; color: var(--text-2); font-weight: 600; }
    .m-toolbar-left .t-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .m-toolbar-left span { color: var(--text-3); font-weight: 500; font-size: 0.62rem; }
    .ai-fill-btn { font-family: 'JetBrains Mono', monospace; padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(108,92,231,0.25); background: var(--accent-dim); color: var(--accent); font-size: 0.6rem; font-weight: 700; cursor: pointer; transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.04em; }
    .ai-fill-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .m-body { padding: 0; overflow-y: auto; flex: 1; }
    .m-panel { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .m-panel:last-child { border-bottom: none; }
    .m-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .m-panel-title { font-family: 'JetBrains Mono', monospace; font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
    .m-panel-title .pd { width: 3px; height: 10px; border-radius: 1px; background: var(--accent); opacity: 0.5; }

    .f-group { margin-bottom: 10px; } .f-group:last-child { margin-bottom: 0; }
    .f-label { font-size: 0.6rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; display: block; }
    .f-label .req { color: var(--rose); }
    .f-input, .f-select, .f-textarea { width: 100%; padding: 9px 12px; font-size: 0.8rem; background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px; color: var(--text-1); outline: none; font-family: inherit; transition: all 0.15s; }
    .f-textarea { resize: none; min-height: 60px; }
    .f-input::placeholder, .f-textarea::placeholder { color: var(--text-3); }
    .f-input:focus, .f-select:focus, .f-textarea:focus { border-color: rgba(108,92,231,0.3); box-shadow: 0 0 0 2px var(--accent-glow); }
    .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 500px) { .f-row { grid-template-columns: 1fr; } }
    .f-group-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }

    .ai-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.52rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid; background: transparent; transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.04em; }
    .ai-btn-g  { color: var(--green); border-color: rgba(0,200,151,0.2); } .ai-btn-g:hover { background: var(--green-dim); }
    .ai-btn-t  { color: var(--teal); border-color: rgba(0,180,216,0.2); } .ai-btn-t:hover { background: var(--teal-dim); }
    .ai-btn-r  { color: var(--rose); border-color: rgba(232,72,104,0.2); } .ai-btn-r:hover { background: var(--rose-dim); }
    .ai-btn-disabled { opacity: 0.3; pointer-events: none; }

    .m-foot { padding: 12px 20px; background: var(--bg-1); border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .btn-save { flex: 1; height: 36px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 700; font-size: 0.76rem; cursor: pointer; transition: all 0.12s; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.04em; }
    .btn-save:hover { opacity: 0.85; } .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-cancel { padding: 0 18px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-3); font-size: 0.76rem; font-weight: 600; cursor: pointer; transition: all 0.12s; }
    .btn-cancel:hover { border-color: var(--border-h); color: var(--text-2); }

    .criteria-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 8px; font-size: 0.72rem; transition: border-color 0.1s; }
    .criteria-row:hover { border-color: var(--border-h); }
    .criteria-check { color: var(--green); font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
    .criteria-text { flex: 1; color: var(--text-2); line-height: 1.4; }
    .criteria-remove { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 0.9rem; padding: 0; transition: color 0.1s; }
    .criteria-remove:hover { color: var(--rose); }
    .crit-add { display: flex; gap: 6px; }
    .crit-add-btn { padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-3); font-size: 0.74rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.1s; }
    .crit-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .reasoning { font-family: 'JetBrains Mono', monospace; font-size: 0.56rem; color: var(--text-3); font-style: italic; margin-top: 4px; }
    .reasoning.hidden { display: none; }
    .form-group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

    .loading-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; }
    .loading-overlay.hidden { display: none; }
    .loading-box { background: var(--bg-1); border: 1px solid var(--border-h); border-radius: 12px; padding: 24px 32px; text-align: center; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.78rem; color: var(--text-2); font-weight: 600; }

    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 50; }
    .toast-wrap.hidden { display: none; }
    .toast-inner { font-family: 'JetBrains Mono', monospace; padding: 10px 16px; border-radius: var(--r); font-size: 0.74rem; font-weight: 600; border: 1px solid; }
    .toast-success { background: var(--bg-1); color: var(--green); border-color: rgba(0,200,151,0.2); }
    .toast-error   { background: var(--bg-1); color: var(--rose); border-color: rgba(232,72,104,0.2); }
    .toast-enter { animation: tIn 0.2s ease; }
    @keyframes tIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Floating Preview */
    .float-preview { position: fixed; right: 0; top: 57px; bottom: 0; width: 360px; background: var(--bg-1); border-left: 1px solid var(--border); z-index: 25; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.23,1,0.32,1); will-change: transform; display: flex; flex-direction: column; box-shadow: -8px 0 30px rgba(0,0,0,0.15); }
    .float-preview.open { transform: translateX(0); }
    .fp-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .fp-head-left { display: flex; align-items: center; gap: 8px; }
    .fp-head-left .fp-indicator { width: 6px; height: 6px; border-radius: 2px; }
    .fp-status { font-family: 'JetBrains Mono', monospace; font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
    .fp-actions { display: flex; gap: 4px; }
    .fp-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; transition: all 0.12s; }
    .fp-btn:hover { border-color: var(--border-h); color: var(--text-1); background: var(--bg-3); }
    .fp-btn-close:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-dim); }
    .fp-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .fp-title { font-size: 0.96rem; font-weight: 700; line-height: 1.4; }
    .fp-desc { font-size: 0.76rem; color: var(--text-2); line-height: 1.55; }
    .fp-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .fp-section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .fp-section-label::before { content: ''; width: 3px; height: 8px; border-radius: 1px; background: var(--accent); opacity: 0.5; }
    .fp-criteria-item { font-size: 0.72rem; color: var(--text-2); line-height: 1.5; padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
    .fp-criteria-item:last-child { border-bottom: none; }
    .fp-criteria-item .fp-check { color: var(--green); font-family: 'JetBrains Mono', monospace; font-weight: 700; flex-shrink: 0; }
    .fp-time { font-family: 'JetBrains Mono', monospace; font-size: 0.56rem; color: var(--text-3); margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
    .board-shifted { padding-right: 388px !important; transition: padding-right 0.25s cubic-bezier(0.23,1,0.32,1); }
    @media (max-width: 900px) { .float-preview { width: 300px; } .board-shifted { padding-right: 328px !important; } }
    @media (max-width: 600px) { .float-preview { width: 100%; top: 0; } .board-shifted { padding-right: 28px !important; } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="brand">
      <div class="brand-mark"><span>K</span></div>
      <span class="brand-name">Agile Kanban</span>
      <span class="brand-sep">·</span>
      <span class="brand-ai">AI Coach</span>
    </div>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Search…" />
    </div>
    <div class="h-actions">
      <button id="dark-mode-toggle" class="h-btn h-btn-icon" onclick="toggleDarkMode()" title="Toggle theme">🌙</button>
      <button class="h-btn h-btn-new" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
    </div>
  </header>

  <div id="stats-bar" class="stats"></div>

  <main class="board">
    <div class="column">
      <div class="col-head"><div class="col-left"><span class="col-indicator ci-todo"></span><span class="col-label">To Do</span><span id="count-todo" class="col-num">0</span></div><button class="col-plus" onclick="openModal(null,'todo')">+</button></div>
      <div id="column-todo" class="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'todo')"></div>
    </div>
    <div class="column">
      <div class="col-head"><div class="col-left"><span class="col-indicator ci-prog"></span><span class="col-label">In Progress</span><span id="count-inprogress" class="col-num">0</span></div><button class="col-plus" onclick="openModal(null,'inprogress')">+</button></div>
      <div id="column-inprogress" class="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'inprogress')"></div>
    </div>
    <div class="column">
      <div class="col-head"><div class="col-left"><span class="col-indicator ci-done"></span><span class="col-label">Done</span><span id="count-done" class="col-num">0</span></div><button class="col-plus" onclick="openModal(null,'done')">+</button></div>
      <div id="column-done" class="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'done')"></div>
    </div>
  </main>

  <div id="modal" class="modal-overlay hidden" onclick="handleModalBackdrop(event)">
    <div class="modal-box">
      <div class="m-head"><h2 id="modal-title">New Ticket <span class="m-tag">Draft</span></h2><button class="m-close" onclick="closeModal()">&times;</button></div>
      <div class="m-toolbar"><div class="m-toolbar-left"><div class="t-icon">⚡</div>AI Auto-Fill<span>— generate all fields from title</span></div><button onclick="aiAutoFillAll()" class="ai-btn ai-fill-btn">Run</button></div>
      <div class="m-body">
        <div class="m-panel"><div class="m-panel-head"><div class="m-panel-title"><span class="pd"></span>Story</div></div>
          <div class="f-group"><label class="f-label">Title <span class="req">*</span></label><input id="ticket-title" type="text" class="f-input" placeholder='e.g. "User Login Page"' /></div>
          <div class="f-group"><label class="f-label">Description</label><textarea id="ticket-description" rows="2" class="f-textarea" placeholder="As a [user], I want [goal] so that [reason]…"></textarea></div>
        </div>
        <div class="m-panel"><div class="m-panel-head"><div class="m-panel-title"><span class="pd"></span>Acceptance Criteria</div><button onclick="aiGenerateCriteria()" class="ai-btn ai-btn-g">✨ Generate</button></div>
          <div id="criteria-list" style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;"></div>
          <div class="crit-add"><input id="criteria-input" type="text" class="f-input" placeholder="Type criterion, Enter to add…" onkeydown="handleCriteriaKey(event)" /><button class="crit-add-btn" onclick="addCriteriaManually()">+</button></div>
        </div>
        <div class="m-panel"><div class="m-panel-head"><div class="m-panel-title"><span class="pd"></span>Estimation</div></div>
          <div class="f-row">
            <div><div class="f-group-head"><label class="f-label" style="margin-bottom:0">Points</label><button onclick="aiEstimatePoints()" class="ai-btn ai-btn-t">✨ Est</button></div><select id="ticket-points" class="f-select"><option value="">—</option><option value="1">1 — Trivial</option><option value="2">2 — Simple</option><option value="3">3 — Small</option><option value="5">5 — Medium</option><option value="8">8 — Large</option><option value="13">13 — Complex</option></select><p id="points-reasoning" class="reasoning hidden"></p></div>
            <div><div class="f-group-head"><label class="f-label" style="margin-bottom:0">Priority</label><button onclick="aiAnalyzePriority()" class="ai-btn ai-btn-r">✨ Pri</button></div><select id="ticket-priority" class="f-select"><option value="normal">Normal</option><option value="urgent">Urgent</option><option value="blocking">Blocking</option></select><p id="priority-reasoning" class="reasoning hidden"></p></div>
          </div>
        </div>
        <div class="m-panel"><div class="m-panel-head"><div class="m-panel-title"><span class="pd"></span>Placement</div></div><select id="ticket-status" class="f-select"><option value="todo">To Do</option><option value="inprogress">In Progress</option><option value="done">Done</option></select></div>
      </div>
      <div class="m-foot"><button onclick="saveTicket()" class="btn-save">Save</button><button onclick="closeModal()" class="btn-cancel">Cancel</button></div>
    </div>
  </div>

  <div id="float-preview" class="float-preview">
    <div class="fp-head"><div class="fp-head-left"><span id="fp-indicator" class="fp-indicator ci-todo"></span><span id="fp-status" class="fp-status">To Do</span></div>
      <div class="fp-actions"><button class="fp-btn" onclick="openModal(document.getElementById('float-preview').dataset.tid)" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="fp-btn fp-btn-close" onclick="closePreview()" title="Close">&times;</button></div>
    </div>
    <div class="fp-body"><div><div id="fp-title" class="fp-title"></div><div id="fp-desc" class="fp-desc" style="margin-top:6px;"></div></div><div id="fp-meta" class="fp-meta"></div><div id="fp-criteria-section"><div class="fp-section-label">Acceptance Criteria</div><div id="fp-criteria"></div></div><div id="fp-time" class="fp-time"></div></div>
  </div>

  <div id="loading" class="loading-overlay hidden"><div class="loading-box"><div class="spinner"></div><p id="loading-text" class="loading-text">Processing…</p></div></div>
  <div id="toast" class="toast-wrap hidden"><div id="toast-inner" class="toast-inner"></div></div>
  <script src="app.js"></script>
</body>
</html>
