<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-mark">KB</span>
        <div>
          <h1 class="brand-title">Kanban AI</h1>
          <p class="brand-sub">Sprint planning · AI Agile Coach</p>
        </div>
      </div>
      <button onclick="openModal()" class="btn btn-primary">
        <span class="btn-icon">+</span> New Ticket
      </button>
    </div>
  </header>

  <main class="board-outer">
    <div class="board-grid">

      <!-- To Do -->
      <div class="column" data-status="todo">
        <div class="column-header">
          <div class="column-header-left">
            <span class="col-dot dot-todo"></span>
            <h2 class="col-label">To Do</h2>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <button onclick="openModal(null,'todo')" class="col-add-btn" title="Add ticket">+</button>
        </div>
        <div
          id="column-todo"
          class="drop-zone"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'todo')"
        ></div>
      </div>

      <!-- In Progress -->
      <div class="column" data-status="inprogress">
        <div class="column-header">
          <div class="column-header-left">
            <span class="col-dot dot-inprogress"></span>
            <h2 class="col-label">In Progress</h2>
            <span class="col-count count-inprogress" id="count-inprogress">0</span>
          </div>
          <button onclick="openModal(null,'inprogress')" class="col-add-btn" title="Add ticket">+</button>
        </div>
        <div
          id="column-inprogress"
          class="drop-zone"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'inprogress')"
        ></div>
      </div>

      <!-- Done -->
      <div class="column" data-status="done">
        <div class="column-header">
          <div class="column-header-left">
            <span class="col-dot dot-done"></span>
            <h2 class="col-label">Done</h2>
            <span class="col-count count-done" id="count-done">0</span>
          </div>
          <button onclick="openModal(null,'done')" class="col-add-btn" title="Add ticket">+</button>
        </div>
        <div
          id="column-done"
          class="drop-zone"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'done')"
        ></div>
      </div>

    </div>
  </main>

  <!-- ── Modal ── -->
  <div id="modal" class="modal-overlay hidden" onclick="handleModalBackdrop(event)">
    <div class="modal-box">

      <div class="modal-header">
        <h2 id="modal-title" class="modal-heading">New Ticket</h2>
        <button onclick="closeModal()" class="modal-close">&times;</button>
      </div>

      <div class="modal-body">

        <!-- AI Auto-Fill -->
        <div class="ai-banner">
          <div class="ai-banner-text">
            <p class="ai-banner-title">AI Auto-Fill</p>
            <p class="ai-banner-desc">Enter a title, then fill all fields at once</p>
          </div>
          <button onclick="aiAutoFillAll()" class="btn btn-ai">Run</button>
        </div>

        <!-- Title -->
        <div class="field">
          <label class="field-label">Title <span class="required">*</span></label>
          <input id="ticket-title" type="text" class="input" placeholder='e.g. "Login Page" or "Password Reset"' />
        </div>

        <!-- Description -->
        <div class="field">
          <label class="field-label">Description</label>
          <textarea id="ticket-description" rows="3" class="input textarea"
            placeholder="As a [user], I want to [goal] so that [reason]…"></textarea>
        </div>

        <!-- Acceptance Criteria -->
        <div class="field">
          <div class="field-row">
            <label class="field-label">Acceptance Criteria</label>
            <button onclick="aiGenerateCriteria()" class="chip-btn chip-violet">Generate with AI</button>
          </div>
          <div id="criteria-list" class="criteria-list"></div>
          <div class="criteria-add-row">
            <input id="criteria-input" type="text" class="input" placeholder="Add criterion and press Enter…"
              onkeydown="handleCriteriaKey(event)" />
            <button onclick="addCriteriaManually()" class="btn btn-ghost">Add</button>
          </div>
        </div>

        <!-- Story Points & Priority -->
        <div class="two-col">
          <div class="field">
            <div class="field-row">
              <label class="field-label">Story Points</label>
              <button onclick="aiEstimatePoints()" class="chip-btn chip-blue">Estimate</button>
            </div>
            <select id="ticket-points" class="input select">
              <option value="">Not estimated</option>
              <option value="1">1 — Trivial</option>
              <option value="2">2 — Simple</option>
              <option value="3">3 — Small</option>
              <option value="5">5 — Medium</option>
              <option value="8">8 — Large</option>
              <option value="13">13 — Complex</option>
            </select>
            <p id="points-reasoning" class="reasoning hidden"></p>
          </div>

          <div class="field">
            <div class="field-row">
              <label class="field-label">Priority</label>
              <button onclick="aiAnalyzePriority()" class="chip-btn chip-amber">Analyze</button>
            </div>
            <select id="ticket-priority" class="input select">
              <option value="normal">Normal</option>
              <option value="urgent">Urgent</option>
              <option value="blocking">Blocking</option>
            </select>
            <p id="priority-reasoning" class="reasoning hidden"></p>
          </div>
        </div>

        <!-- Column -->
        <div class="field">
          <label class="field-label">Column</label>
          <select id="ticket-status" class="input select">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button onclick="saveTicket()" class="btn btn-primary btn-wide">Save Ticket</button>
        <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
      </div>

    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-text" class="loading-text">AI is thinking…</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <div id="toast-inner" class="toast-inner"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
